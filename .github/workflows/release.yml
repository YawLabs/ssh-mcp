name: Release

on:
  push:
    tags:
      - 'v*'

# Serialize all release runs. Tags rarely arrive back-to-back, but when they
# do, two parallel publish jobs would race on npm and one would fail with
# "cannot publish over previously published version". The group key is a
# hardcoded literal (not `${{ github.workflow }}` or `release-${{ github.ref }}`)
# so different tags share a single queue and a future rename of the workflow
# `name:` field can't silently fragment the queue across the rename window.
# cancel-in-progress is false so a queued run waits its turn instead of being
# killed: losing a tag's release event is worse than waiting a minute.
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Release
        run: bash release.sh
        env:
          CI: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to the Official MCP Registry (registry.modelcontextprotocol.io)
      # via GitHub OIDC. The `id-token: write` permission already enabled for
      # npm provenance covers the registry auth too -- no MCP_* secret needed.
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Sync server.json version to the pushed tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp
          mv server.tmp server.json

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
