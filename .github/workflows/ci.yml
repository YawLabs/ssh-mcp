name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # `npm test` is `vitest run`, which executes from source -- it does
      # NOT exercise tsup. The explicit build step exists to fail-fast on
      # tsup config / output errors at PR time rather than discovering
      # them at release time. Worth the ~5-10s.
      - run: npm run build
      - run: npm test
